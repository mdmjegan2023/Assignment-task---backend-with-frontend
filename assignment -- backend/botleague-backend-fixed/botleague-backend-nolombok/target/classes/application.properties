# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/botleague
spring.data.mongodb.database=botleague

# JWT
app.jwt.secret=BotLeagueSecretKey2024!RoboticsArenaIndia$SecureJWT@Key#256bits
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Mail (configure with your SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.botleague=DEBUG
logging.level.org.springframework.security=INFO
